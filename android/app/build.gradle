apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

import java.util.Properties
import groovy.json.JsonSlurper

def env = new Properties()
def envFile = new File(rootDir, "../.env")
if (envFile.exists()) {
    envFile.withInputStream { env.load(it) }
}
else {
    logger.warn(".env file not found at ${envFile.absolutePath}")
} 

def getAppConfig() {
    def jsonFile = new File(rootDir, "../app.json")
    def parsedJson = new JsonSlurper().parse(jsonFile)

    return [
        parsedJson.appVersion,
        parsedJson.androidVersionCode
    ]
}

def getEnv = { propName ->
    return env.getProperty(propName) ?: System.getenv(propName)
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.incyclist.app"
    defaultConfig {
        def appConfig = getAppConfig()

        applicationId "com.incyclist.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appConfig[1]
        versionName appConfig[0]
    }
    signingConfigs {
        release {
            def keystoreName = getEnv("MYAPP_UPLOAD_STORE_FILE")
            if (keystoreName != null) {
                // It looks for the keystore in project root
                storeFile file(keystoreName)
                storePassword getEnv("MYAPP_UPLOAD_STORE_PASSWORD")
                keyAlias getEnv("MYAPP_UPLOAD_KEY_ALIAS")
                keyPassword getEnv("MYAPP_UPLOAD_KEY_PASSWORD")            
            }
            else {
                logger.warn("Signing properties missing in .env or environment")
            }
        }
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [
                usesCleartextTraffic: "true",
                MAPS_API_KEY: getEnv("MAPS_API_KEY") ?: ""
            ]            
        }
        // NEW: Test build type (Release-like but allowing local HTTP)
        dev {
            initWith release // Inherits minification and Hermes settings
            signingConfig signingConfigs.debug 
            matchingFallbacks = ['release']
            // This flag is what we'll check in our TypeScript code
            manifestPlaceholders = [
                usesCleartextTraffic:"true",
                MAPS_API_KEY: getEnv("MAPS_API_KEY") ?: ""
            ]
        }        
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            manifestPlaceholders = [
                usesCleartextTraffic:"false",
                MAPS_API_KEY: getEnv("MAPS_API_KEY") ?: ""                
            ]
        }
    }

}

configurations.all {
    resolutionStrategy {
        dependencySubstitution {
            substitute module('org.bouncycastle:bcprov-jdk15on') using module('org.bouncycastle:bcprov-jdk15to18:1.78.1')
            substitute module('org.bouncycastle:bcpkix-jdk15on') using module('org.bouncycastle:bcpkix-jdk15to18:1.78.1')
        }
        
        force 'org.bouncycastle:bcprov-jdk15to18:1.78.1'
        force 'org.bouncycastle:bcpkix-jdk15to18:1.78.1'
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
    
    // Google Maps Android SDK — used ONLY by the StreetView Fabric component.
    // This app uses Apple Maps on iOS via react-native-maps and MapLibre on
    // Android — Google Maps is not used anywhere else. This dependency exists
    // so that com.google.android.gms.maps.StreetViewPanoramaView resolves.
    // Pinned to 18.2.0 for deterministic builds, consistent with kotlinVersion
    // and other version pins in the project.
    implementation "com.google.android.gms:play-services-maps:18.2.0"

}
