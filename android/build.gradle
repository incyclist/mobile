buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

// This block is the "magic" fix for legacy libraries like @fdfedin/react-native-native-mqtt
// It injects a 'jcenter()' method into the repository handler of every sub-project
allprojects {
    repositories {
        // We use Groovy meta-programming to add the missing method dynamically
        repo ->
            if (!repo.metaClass.respondsTo(repo, 'jcenter')) {
                repo.metaClass.jcenter = { -> 
                    println "Redirecting jcenter() call to mavenCentral() for project ${project.name}"
                    mavenCentral() 
                }
            }
            
        google()
        mavenCentral()
    }
}


apply plugin: "com.facebook.react.rootproject"
