name: Upload Android to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track'
        required: true
        type: choice
        options:
          - production
          - open_testing
          - closed_testing
        default: production
      rollout:
        description: 'Staged rollout percentage (production only, 1-100)'
        required: false
        default: '10'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.MYAPP_UPLOAD_KEYSTORE }}" | base64 --decode > android/app/upload.jks

      - name: Create config.json
        run: |
          mkdir -p config
          echo '{"GOOGLE_PROJECT_NUMBER":"${{ secrets.GOOGLE_PROJECT_NUMBER }}"}' > config/config.json

      - name: Build release AAB
        working-directory: android
        env:
          MYAPP_UPLOAD_STORE_FILE: upload.jks
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
        run: |
          ./gradlew clean bundleRelease

      # Maps the friendly choice in the workflow_dispatch UI to the track
      # names the Play Developer API actually expects, and decides whether
      # a staged rollout (userFraction) applies.
      - name: Resolve release parameters
        id: release_params
        run: |
          case "${{ github.event.inputs.track }}" in
            production)
              echo "play_track=production" >> "$GITHUB_OUTPUT"
              echo "status=inProgress" >> "$GITHUB_OUTPUT"
              FRACTION=$(awk "BEGIN { printf \"%.2f\", ${{ github.event.inputs.rollout }}/100 }")
              echo "user_fraction=$FRACTION" >> "$GITHUB_OUTPUT"
              ;;
            open_testing)
              echo "play_track=beta" >> "$GITHUB_OUTPUT"
              echo "status=completed" >> "$GITHUB_OUTPUT"
              echo "user_fraction=" >> "$GITHUB_OUTPUT"
              ;;
            closed_testing)
              echo "play_track=alpha" >> "$GITHUB_OUTPUT"
              echo "status=completed" >> "$GITHUB_OUTPUT"
              echo "user_fraction=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Upload to Google Play (staged rollout)
        if: steps.release_params.outputs.user_fraction != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.incyclist.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.release_params.outputs.play_track }}
          status: ${{ steps.release_params.outputs.status }}
          userFraction: ${{ steps.release_params.outputs.user_fraction }}

      - name: Upload to Google Play (testing track)
        if: steps.release_params.outputs.user_fraction == ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.incyclist.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.release_params.outputs.play_track }}
          status: ${{ steps.release_params.outputs.status }}
